<!doctype html>

<html lang="en">
  <head>
    <title>xmldoc browser test</title>
  </head>
  <body>
    <!--
      xmldoc is an ES module. In the browser, import it (and its "sax"
      dependency) straight from an npm CDN such as esm.sh. There is no longer a
      browser-global build - use a real module import like the one below.
    -->
    <script type="module">
      import { XmlDocument } from "https://esm.sh/xmldoc";

      // Demonstrate parsing an in-memory XML string
      const xmlString =
        '<suggestions><book title="Twilight"/><book title="Twister"/></suggestions>';

      const suggestions = new XmlDocument(xmlString);

      // Demonstrate how toString() will pretty-print the XML for debugging
      console.log("Parsed: \n" + suggestions);

      // Demonstrate a simple eachChild() loop, printing our book titles
      for (const book of suggestions.childrenNamed("book")) {
        const p = document.createElement("p");
        p.textContent = `Found book with title: '${book.attr.title}'`;
        document.body.appendChild(p);
      }
    </script>
  </body>
</html>
